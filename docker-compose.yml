services:
  db:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: snippetbox
      MYSQL_USER: web
      MYSQL_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 10s
    volumes:
      - dbdata:/var/lib/mysql
  test-db:
    profiles: ["test"]
    image: mysql:8
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: test_snippetbox
      MYSQL_USER: test_web
      MYSQL_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 10s
    volumes:
      - testdbdata:/var/lib/mysql
  redis:
    image: redis:7
    ports:
    - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"] 
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "mysql://web:pass@tcp(db:3306)/snippetbox?multiStatements=true",
        "up"
      ]
    restart: "no"

  app:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command:
      - ./server
      - -dsn=web:pass@tcp(db:3306)/snippetbox?parseTime=true
      - -static-dir=/app/ui/static
      - -redis-addr=redis:6379
      - -redis-password=
      - -redis-db=0

  test:
    profiles: ["test"]
    image: golang:1.25.6
    working_dir: /app
    depends_on:
      test-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      DSN: test_web:pass@tcp(db:3307)/snippetbox?parseTime=true
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
    command: ["sh", "-c", "go mod tidy && go test ./..."]
volumes:
  dbdata:
  redisdata:
  testdbdata: